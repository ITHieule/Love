<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>

    <link rel="stylesheet" href="css/date.css" />
  </head>

  <body>

<div class="petals">
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>
  <span>🌸</span>

  <span>🌺</span>
  <span>🌺</span>
  <span>🌺</span>
  <span>🌺</span>

  <span>💮</span>
  <span>💮</span>
  <span>💮</span>
  <span>💮</span>

</div>
    <!-- khung thiệp -->
    <div class="card-scene">

      <div class="wedding-card">

        <!-- nội dung -->
        <div class="card-inside">

          <h2>💍𝐖𝐄𝐃𝐃𝐈𝐍𝐆 𝐂𝐄𝐑𝐄𝐌𝐎𝐍𝐘💍</h2>

          <p class="invite-text">
             𝗧ụ𝗶 𝗺ì𝗻𝗵 𝗿ấ𝘁 𝗺𝗼𝗻𝗴 𝗱ượ𝗰 𝗴ặ𝗽 𝗯ạ𝗻 𝘁𝗿𝗼𝗻𝗴 𝗻𝗴à𝘆 𝗵ạ𝗻𝗵 𝗽𝗵ú𝗰 𝗻𝗵ấ𝘁 💖
          </p>

          <!-- layout giữa -->
          <div class="content-row">

            <!-- hình trái -->
            <div class="inside-image left-inside resizable draggable">
              <img
                src="activities/daure.png"
                alt="Cô dâu chú rể"
                class="inside-img"
              />

              <div class="resize-handle"></div>
            </div>

            <!-- box ngày -->
            <div class="date-box">

              <h1>𝟐𝟖-𝟐𝟗/𝟏𝟏</h1>
              <p>( 𝐓ứ𝐜 𝐍𝐠à𝐲 𝟐𝟎-𝟐𝟏/𝟏𝟎 𝐍ă𝐦 Ấ𝐭 𝐓ỵ )</p>

              <div class="decor-line">
                <span></span>
                💖
                <span></span>
              </div>

            </div>

            <!-- hình phải -->
            <div class="inside-image right-inside resizable draggable">
              <img
                src="activities/congcuoi.jpg"
                alt="Cổng cưới"
                class="inside-img"
              />

              <div class="resize-handle"></div>
            </div>

          </div>

          <!-- nút -->
          <button
            class="button"
            onclick="location.href='food.html'"
          >
            𝐓𝐢ế𝐩 𝐓ụ𝐜 𝐍à𝐨 💌
          </button>

        </div>

        <!-- cánh trái -->
        <div class="card-cover left-cover"></div>

        <!-- cánh phải -->
        <div class="card-cover right-cover"></div>

      </div>

    </div>

    <script>
  const images = document.querySelectorAll(".inside-img");

  images.forEach((img) => {

    let scale = 1;

    img.addEventListener("wheel", (e) => {

      e.preventDefault();

      if (e.deltaY < 0) {
        scale += 0.1;
      } else {
        scale -= 0.1;
      }

      if (scale < 1) scale = 1;
      if (scale > 3) scale = 3;

      img.style.transform = `scale(${scale})`;
    });

  });
</script>

  </body>
</html>
