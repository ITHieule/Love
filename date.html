<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <link rel="stylesheet" href="css/date.css" />
</head>

<body>

<!-- TIM BAY -->
<div class="hearts">
  <span>💖</span><span>💖</span><span>💖</span>
  <span>💖</span><span>💖</span>
</div>

<div class="card-scene">

  <div class="wedding-card">

    <!-- CHỮ CLICK MỞ THIỆP -->
    <div class="card-center-text" id="openBtn">囍</div>

    <!-- NỘI DUNG -->
    <div class="card-inside">

      <h2>💍𝐖𝐄𝐃𝐃𝐈𝐍𝐆 𝐂𝐄𝐑𝐄𝐌𝐎𝐍𝐘💍</h2>

      <p class="invite-text">
        𝗧ụ𝗶 𝗺ì𝗻𝗵 𝗿ấ𝘁 𝗺𝗼𝗻𝗴 𝗱ượ𝗰 𝗴ặ𝗽 𝗯ạ𝗻 𝘁𝗿𝗼𝗻𝗴 𝗻𝗴à𝘆 𝗵ạ𝗻𝗵 𝗽𝗵ú𝗰 𝗻𝗵ấ𝘁 💖
      </p>

      <div class="content-row">

        <div class="inside-image">
          <img src="activities/daure.png" class="inside-img" />
        </div>

        <div class="date-box">
          <h1>28-29/11</h1>
          <p>(Tức 20-21/10 Âm lịch)</p>
        </div>

        <div class="inside-image">
          <img src="activities/congcuoi.jpg" class="inside-img" />
        </div>

      </div>

      <button class="button" onclick="location.href='food.html'">
        𝐓𝐢ế𝐩 𝐓ụ𝐜 💌
      </button>

    </div>

    <!-- CÁNH THIỆP -->
    <div class="card-cover left-cover"></div>
    <div class="card-cover right-cover"></div>

  </div>

</div>

<script>
const btn = document.getElementById("openBtn");

btn.addEventListener("click", () => {

  const left = document.querySelector(".wedding-card .left-cover");
  const right = document.querySelector(".wedding-card .right-cover");

  left.style.transition = "transform 2.5s ease";
  right.style.transition = "transform 2.5s ease";

  left.style.transform = "rotateY(-165deg)";
  right.style.transform = "rotateY(165deg)";

  setTimeout(() => {
    btn.style.opacity = "0";
    btn.style.pointerEvents = "none";
  }, 800);

});
</script>

</body>
</html>
