<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <link rel="stylesheet" href="css/date.css" />
</head>

<body>

<!-- PHÁO HOA -->
<div class="petals">
  <span>🌸</span><span>🌸</span><span>🌸</span><span>🌸</span>
  <span>🌸</span><span>🌸</span><span>🌸</span><span>🌸</span>
  <span>🌺</span><span>🌺</span><span>🌺</span><span>🌺</span>
  <span>💮</span><span>💮</span><span>💮</span><span>💮</span>
</div>

<!-- KHUNG THIỆP -->
<div class="card-scene">

  <div class="wedding-card">

    <!-- NÚT MỞ THIỆP -->
    <div class="card-center-text" id="openBtn">囍</div>

    <!-- NỘI DUNG -->
    <div class="card-inside">

      <h2>💍𝐖𝐄𝐃𝐃𝐈𝐍𝐆 𝐂𝐄𝐑𝐄𝐌𝐎𝐍𝐘💍</h2>

      <p class="invite-text">
        𝗧ụ𝗶 𝗺ì𝗻𝗵 𝗿ấ𝘁 𝗺𝗼𝗻𝗴 𝗱ượ𝗰 𝗴ặ𝗽 𝗯ạ𝗻 💖
      </p>

      <div class="content-row">

        <div class="inside-image">
          <img src="activities/daure.png" class="inside-img" />
        </div>

        <div class="date-box">

          <h1>28-29/11</h1>
          <p>(20-21/10 Âm lịch)</p>

          <div class="calendar">

            <div class="calendar-weekdays">
              <span>T2</span><span>T3</span><span>T4</span>
              <span>T5</span><span>T6</span><span>T7</span><span>CN</span>
            </div>

            <div class="calendar-days">
              <span></span><span></span><span></span><span></span><span></span><span></span>
              <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
              <span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
              <span>11</span><span>12</span><span>13</span><span>14</span><span>15</span>
              <span>16</span><span>17</span><span>18</span><span>19</span><span>20</span>
              <span>21</span><span>22</span><span>23</span><span>24</span><span>25</span>
              <span>26</span><span>27</span>
              <span class="love-day">28</span>
              <span class="love-day">29</span>
              <span>30</span>
            </div>

          </div>
        </div>

        <div class="inside-image">
          <img src="activities/congcuoi.jpg" class="inside-img" />
        </div>

      </div>

      <button class="button" onclick="location.href='food.html'">
        𝐓𝐢ế𝐩 𝐓ụ𝐜 💌
      </button>

    </div>

    <!-- CÁNH THIỆP -->
    <div class="card-cover left-cover"></div>
    <div class="card-cover right-cover"></div>

  </div>
</div>

<script>
/* ZOOM IMAGE */
const images = document.querySelectorAll(".inside-img");

images.forEach((img) => {
  let scale = 1;

  /* ================= PC (wheel) ================= */
  img.addEventListener("wheel", (e) => {
    e.preventDefault();

    if (e.deltaY < 0) scale += 0.1;
    else scale -= 0.1;

    if (scale < 1) scale = 1;
    if (scale > 3) scale = 3;

    img.style.transform = `scale(${scale})`;
  }, { passive: false });


  /* ================= MOBILE (pinch zoom đơn giản) ================= */
  let startDistance = 0;

  const getDistance = (touches) => {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  };

  img.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) {
      startDistance = getDistance(e.touches);
    }
  });

  img.addEventListener("touchmove", (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();

      const newDistance = getDistance(e.touches);

      if (startDistance > 0) {
        const diff = newDistance - startDistance;

        if (diff > 10) scale += 0.05;
        if (diff < -10) scale -= 0.05;

        if (scale < 1) scale = 1;
        if (scale > 3) scale = 3;

        img.style.transform = `scale(${scale})`;
      }

      startDistance = newDistance;
    }
  }, { passive: false });

});
/* MỞ THIỆP */
const btn = document.getElementById("openBtn");

btn.addEventListener("click", () => {

  const left = document.querySelector(".left-cover");
  const right = document.querySelector(".right-cover");

  left.style.transition = "transform 2.5s ease";
  right.style.transition = "transform 2.5s ease";

  left.style.transform = "rotateY(-165deg)";
  right.style.transform = "rotateY(165deg)";

  setTimeout(() => {
    btn.style.opacity = "0";
    btn.style.pointerEvents = "none";
  }, 800);
});

const petals = document.querySelectorAll(".petals span");

petals.forEach((p) => {

  function loop() {

    const x = (Math.random() * 1200 - 600) + "px";
    const y = (Math.random() * 800 - 400) + "px";

    p.style.setProperty("--x", x);
    p.style.setProperty("--y", y);

    // mỗi hạt tự lặp liên tục
    const delay = 1500 + Math.random() * 2000;

    setTimeout(loop, delay);
  }

  // delay ngẫu nhiên ban đầu để không đồng bộ
  setTimeout(loop, Math.random() * 2000);

});
</script>

</body>
</html>
