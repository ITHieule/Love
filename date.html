    <script>
  const images = document.querySelectorAll(".inside-img");

  images.forEach((img) => {

    let scale = 1;

    img.addEventListener("wheel", (e) => {

      e.preventDefault();

      if (e.deltaY < 0) {
        scale += 0.1;
      } else {
        scale -= 0.1;
      }

      if (scale < 1) scale = 1;
      if (scale > 3) scale = 3;

      img.style.transform = `scale(${scale})`;
    });

  });
</script>
